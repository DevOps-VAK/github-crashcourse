name: Terraform Approval Gate Test

on:
  push:


jobs:

####################################################
# PLAN STAGE
####################################################

  terraform-plan:
    defaults:
      run:
        shell: bash
    name: Terraform Plan Simulation
    runs-on: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Terraform Init
        run: |
          echo "================================"
          echo "Terraform Init"
          echo "================================"
          echo "terraform init completed"

      - name: Simulate Terraform Plan
        run: |
          echo "================================"
          echo "Terraform Plan"
          echo "================================"
          echo "Terraform plan completed successfully"
          echo "terraform-plan-for-dev" > tfplan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: tfplan.txt

####################################################
# APPROVAL + APPLY STAGE
####################################################

  terraform-apply:
    defaults:
      run:
        shell: bash
        
    name: Terraform Apply Simulation
    needs:
      - terraform-plan
    runs-on: ci

    # THIS CREATES THE MANUAL APPROVAL GATE

    environment:
      name: Dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-dev

      - name: Show Approved Plan
        run: |
          echo "================================"
          echo "Approved Terraform Plan"
          echo "================================"
          cat tfplan.txt

      - name: Simulate Terraform Apply
        run: |
          echo "================================"
          echo "Terraform Apply"
          echo "================================"
          echo "Terraform apply completed successfully"